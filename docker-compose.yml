services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rrie-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://redis:6379
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/').then(r => {if (r.status !== 200) process.exit(1)}).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis
    networks:
      - rrie-network
    restart: unless-stopped

    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rrie-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - rrie-network
    restart: unless-stopped

  # Redis Geospatial Cache
  redis:
    image: redis:alpine
    container_name: rrie-redis
    ports:
      - "6379:6379"
    networks:
      - rrie-network
    restart: unless-stopped

networks:
  rrie-network:
    driver: bridge
